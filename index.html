<script>
const COLORS={red:'#e53935',orange:'#ff8c00',yellow:'#fdd835',green:'#4caf50',none:'#ccc'};
const LVL={red:4,orange:3,yellow:2,green:1,none:0};
const COASTAL='Coastal Event';

function normLevel(l){return(l||'none').toLowerCase()}

function maxLevel(code,coastalOnly,data){
  let max='none';
  data.forEach(w=>{
    if(w.idAreaAviso!==code)return;
    const isCoastal=w.awarenessTypeName===COASTAL;
    if(coastalOnly&&!isCoastal)return;
    if(!coastalOnly&&isCoastal)return;
    const lv=normLevel(w.awarenessLevelID);
    if((LVL[lv]||0)>(LVL[max]||0))max=lv;
  });
  return max;
}

function paint(id,color){
  const el=document.getElementById(id);
  if(el)el.setAttribute('fill',color);
}

async function load(){
  try{
    const res=await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();

    const lvMCN=maxLevel('MCN',false,data);
    const lvMRM=maxLevel('MRM',false,data);
    const lvMCS=maxLevel('MCS',false,data);
    const lvAMN=maxLevel('MCN',true,data);
    const lvAMS=maxLevel('MCS',true,data);

    paint('reg-AM-N', COLORS[lvAMN!=='none'?lvAMN:lvMCN]);
    paint('reg-MCN',  COLORS[lvMCN]);
    paint('reg-MRM',  COLORS[lvMRM]);
    paint('reg-MCS',  COLORS[lvMCS]);
    paint('reg-AM-S', COLORS[lvAMS!=='none'?lvAMS:lvMCS]);

    if(window.parent!==window)
      window.parent.postMessage({type:'resize',height:document.body.scrollHeight},'*');
  }catch(e){console.error(e);}
}

load();
setInterval(load,10*60*1000);
</script>
