<script>
const ALERT_COLORS={red:'#e53935',orange:'#ff8c00',yellow:'#fdd835',green:'#4caf50',none:'#ccc'};
const LVL={red:4,orange:3,yellow:2,green:1,none:0};
const IPMA_CODE={'AM-N':'MCN','MCN':'MCN','MRM':'MRM','MCS':'MCS','AM-S':'MCS'};
const COASTAL='Coastal Event';

function normLevel(l){return(l||'none').toLowerCase()}

function maxLevel(ipmaCode, coastalOnly, data){
  let max='none';
  data.forEach(w=>{
    if(w.idAreaAviso!==ipmaCode)return;
    const isCoastal=(w.awarenessTypeName===COASTAL);
    if(coastalOnly && !isCoastal)return;
    if(!coastalOnly && isCoastal)return;
    const lv=normLevel(w.awarenessLevelID);
    if((LVL[lv]||0)>(LVL[max]||0))max=lv;
  });
  return max;
}

async function load(){
  try{
    const res=await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();

    ['AM-N','MCN','MRM','MCS','AM-S'].forEach(reg=>{
      const coastal=(reg==='AM-N'||reg==='AM-S');
      const lv=maxLevel(IPMA_CODE[reg],coastal,data);
      const color=ALERT_COLORS[lv]||ALERT_COLORS.none;
      const path=document.getElementById('reg-'+reg);
      const dot=document.getElementById('dot-'+reg);
      if(path){path.setAttribute('fill',color);path.setAttribute('stroke',color);}
      if(dot)dot.style.background=color;
    });

    if(window.parent!==window)
      window.parent.postMessage({type:'resize',height:document.body.scrollHeight},'*');
  }catch(e){console.error(e);}
}

load();
setInterval(load,10*60*1000);
</script>
